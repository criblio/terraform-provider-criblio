      additionalProperties: false
      properties:
        filter:
          title: Filter
          description: 'Filter that selects data to be fed through this Function. Default: "true"'
          type: string
          x-terraform-optional-computed: true
          x-terraform-suppress-diff: explicit
        id:
          title: ID
          description: Function ID.
          type: string
          x-terraform-not-null: true
          x-terraform-optional-computed: true
          x-terraform-suppress-diff: explicit
        description:
          title: Description
          description: Simple description of this step
          type: string
          x-terraform-optional-computed: true
          x-terraform-suppress-diff: explicit
        disabled:
          title: Disabled
          description: If true, data will not be pushed through this function
          type: boolean
          x-terraform-optional-computed: true
          x-terraform-suppress-diff: explicit
        final:
          title: Final
          description: If enabled, stops the results of this Function from being passed to the downstream Functions
          type: boolean
          x-terraform-optional-computed: true
          x-terraform-suppress-diff: explicit
        conf:
          type: object
          title: Function-specific configs
          description: Function configuration as JSON. In HCL use jsonencode({ ... }); the exact object schema depends on the function type in the Cribl API (eval, serde, code, drop, etc.).
          additionalProperties: true
          x-terraform-object-as-json: true
          x-terraform-custom-type: jsontypes.NormalizedType{}
          x-terraform-not-null: true
          x-terraform-valid-json: true
          x-terraform-optional-computed: true
          x-terraform-suppress-diff: explicit
          x-terraform-plan-modifier-hook: pipelineConfPlanModifiers
