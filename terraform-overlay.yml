      splunkHecAPI:
        type: string
        description: Absolute path for Splunk HTTP Event Collector (HEC) API requests. Required when type is splunk_hec.
        pattern: ^/|^$
      splunkHecAcks:
        type: boolean
        description: When true, enable Splunk HEC acknowledgements. Used when type is splunk_hec.
      criblAPI:
        type: string
        description: Absolute path for Cribl HTTP API requests. Used when type is cribl_http.
        pattern: ^/|^$
      elasticAPI:
        type: string
        description: Absolute path for Elasticsearch bulk API requests. Used when type is elastic.
        pattern: ^/|^$
      prometheusAPI:
        type: string
        description: Absolute path for Prometheus remote write requests. Used when type is prometheus_rw.
        pattern: ^/
      tcpPort:
        type: integer
        minimum: 0
        maximum: 65535
        description: TCP listen port when the source type uses a dedicated TCP port.
      udpPort:
        type: integer
        minimum: 0
        maximum: 65535
        description: UDP listen port when applicable.
      subscriptions:
        type: array
        description: WEF subscriptions; required when type is wef.
        items:
          $ref: "#/components/schemas/LocalSearchSourceWefSubscriptionItem"
  - target: "$.components.schemas"
    update:
      LocalSearchSourceWefSubscriptionItem:
        type: object
        description: WEF subscription entry for Local Search when type is wef.
        required:
          - subscriptionName
          - contentFormat
          - heartbeatInterval
          - batchTimeout
          - targets
        properties:
          subscriptionName:
            type: string
            description: Subscription name exposed to Windows clients.
          version:
            type: string
            description: Version UUID for this subscription.
          contentFormat:
            type: string
            enum:
              - Raw
              - RenderedText
            description: Content format for delivered events.
            x-speakeasy-unknown-values: allow
          heartbeatInterval:
            type: number
            minimum: 1
            description: Maximum seconds between endpoint check-ins before marking unavailable.
          batchTimeout:
            type: number
            minimum: 0
            description: Seconds to collect events before sending to Cribl.
          readExistingEvents:
            type: boolean
            x-terraform-ignore: true
          sendBookmarks:
            type: boolean
            x-terraform-ignore: true
          compress:
            type: boolean
            x-terraform-ignore: true
          targets:
            type: array
            description: DNS names of endpoints that forward these events.
            items:
              type: string
              minLength: 1
          locale:
            type: string
            x-terraform-ignore: true
          metadata:
            type: array
            x-terraform-ignore: true
            items:
              type: object
              additionalProperties: true
          id:
            type: string
          querySelector:
            type: string
            description: Query builder mode; simple with queries, or xml with xmlQuery.
            enum:
              - simple
              - xml
            x-speakeasy-unknown-values: allow
          queries:
            type: array
            description: Path and XPath selector entries when using simple mode.
            items:
              type: object
              required:
                - path
                - queryExpression
              properties:
                path:
                  type: string
                queryExpression:
                  type: string
          xmlQuery:
            type: string
            description: XPath query when using xml mode.
