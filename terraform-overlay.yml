  - target: "$.paths./m/{groupId}/lib/jobs/{id}.delete"
    update:
      x-terraform-delete: Collector
  - target: "$.components.schemas.InputCollector"
    update:
      properties:
        environment:
          type: string
          title: Environment
          x-terraform-optional-computed: true
          x-terraform-plan-modifier-hook: collectorEnvironmentPlanModifiers
        ignoreGroupJobsLimit:
          type: boolean
          title: Ignore group jobs limit
