openapi: 3.1.0
paths:
  /m/{groupId}/system/certificates:
    post:
      operationId: createCertificate
      x-terraform-resource: true
      x-terraform-resource-name: certificate
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CertificateCreate"
            examples:
              CertificateCreateExample:
                $ref: "#/components/examples/CertificateCreateExample"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
  /m/{groupId}/system/certificates/{id}:
    get:
      operationId: getCertificateByID
      x-terraform-read: certificate
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
    patch:
      operationId: updateCertificateByID
      x-terraform-update: certificate
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CertificateCreate"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
    delete:
      operationId: deleteCertificateByID
      x-terraform-delete: certificate
      x-terraform-delete-hook: deleteCertificateSoft
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
  /destinations:
    post:
      operationId: createDestination
      x-terraform-resource: true
      x-terraform-resource-name: destination
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Destination"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Destination"
  /mapping-rulesets/{id}:
    patch:
      operationId: updateMappingRuleset
      x-terraform-resource: true
      x-terraform-resource-name: mapping_ruleset
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MappingRuleset"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MappingRuleset"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /m/{groupId}/system/keys:
    post:
      operationId: createKeyMetadataEntity
      x-terraform-resource: true
      x-terraform-resource-name: Key
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeyMetadataEntity"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyMetadataEntity"
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: query
          required: true
          schema:
            type: string
  /m/{groupId}/system/keys/{id}:
    get:
      operationId: getKeyMetadataEntityById
      x-terraform-read: Key
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyMetadataEntity"
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
    patch:
      operationId: updateKeyMetadataEntityById
      x-terraform-update: Key
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeyMetadataEntity"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyMetadataEntity"
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
    delete:
      operationId: deleteKeyMetadataEntityById
      x-terraform-delete: Key
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyMetadataEntity"
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
components:
  examples:
    CertificateCreateExample:
      summary: Certificate from upstream
      value:
        id: upstream-cert
        cert: upstream-cert-body
        privKey: upstream-private-key
        displayName: Upstream Certificate
        args:
          - type: number
            name: precision
  schemas:
    CertificateCreate:
      type: object
      required:
        - cert
        - id
        - privKey
      properties:
        cert:
          type: string
        id:
          type: string
          x-terraform-force-new: true
          x-terraform-suppress-diff: explicit
        privKey:
          type: string
          writeOnly: true
        passphrase:
          type: string
          x-terraform-sensitive: true
          x-terraform-prefer-state: true
        displayName:
          type: string
          x-terraform-name: display_name
        conf:
          type: string
          x-terraform-custom-type: jsontypes.NormalizedType{}
        args:
          type: array
          x-terraform-prefer-state: true
          x-terraform-suppress-diff: explicit
          items:
            type: object
            x-terraform-suppress-diff: explicit
            required:
              - type
              - name
            properties:
              type:
                type: string
                x-terraform-suppress-diff: explicit
              name:
                type: string
                x-terraform-suppress-diff: explicit
        ignored:
          type: string
          x-terraform-ignore: true
    Certificate:
      type: object
      properties:
        cert:
          type: string
        id:
          type: string
        privKey:
          type: string
          writeOnly: true
        passphrase:
          type: string
          x-terraform-sensitive: true
          x-terraform-prefer-state: true
        certExpiryDate:
          type: string
          readOnly: true
        args:
          type: array
          x-terraform-prefer-state: true
          x-terraform-suppress-diff: explicit
          items:
            type: object
            x-terraform-suppress-diff: explicit
            required:
              - type
              - name
            properties:
              type:
                type: string
                x-terraform-suppress-diff: explicit
              name:
                type: string
                x-terraform-suppress-diff: explicit
        inUse:
          type: array
          items:
            type: string
          x-terraform-computed: true
    Destination:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        output:
          oneOf:
            - $ref: "#/components/schemas/OutputAzureBlob"
            - $ref: "#/components/schemas/OutputElastic"
            - $ref: "#/components/schemas/OutputS3"
    OutputAzureBlob:
      type: object
      properties:
        accountKey:
          type: string
          x-terraform-sensitive: true
          x-terraform-prefer-state: true
        container:
          type: string
    OutputElastic:
      type: object
      properties:
        url:
          type: string
    OutputS3:
      type: object
      properties:
        bucket:
          type: string
    KeyMetadataEntity:
      type: object
      required:
        - keyId
        - algorithm
      properties:
        keyId:
          type: string
          x-terraform-name: id
          x-terraform-suppress-diff: explicit
          x-terraform-prefer-state: true
        terraformKeyId:
          type: string
          x-terraform-name: key_id
          x-terraform-computed: true
        algorithm:
          type: string
          x-terraform-optional-computed: true
        plainKey:
          type: string
          x-terraform-ignore: true
        cipherKey:
          type: string
          x-terraform-ignore: true
    MappingRuleset:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        conf:
          type: object
          properties:
            functions:
              type: array
              items:
                type: object
                required:
                  - id
                  - final
                  - conf
                properties:
                  id:
                    type: string
                  final:
                    type: boolean
                  description:
                    type: string
                  conf:
                    type: object
                    required:
                      - add
                    properties:
                      labels:
                        type: array
                        items:
                          type: string
                      add:
                        type: array
                        items:
                          type: object
                          required:
                            - name
                            - value
                          properties:
                            name:
                              type: string
                            value:
                              type: string
