# GoReleaser config for goatify CLI. Triggered by tags: goatify-v0.0.1, goatify-v0.0.2, etc.
version: 2

project_name: cribl-tf-config-exporter

before:
  hooks:
    - go mod tidy

builds:
  - id: goatify
    dir: .
    main: ./tools/import-cli
    binary: cribl-tf-config-exporter
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X github.com/criblio/terraform-provider-criblio/tools/import-cli/version.Version={{.Version}} -X github.com/criblio/terraform-provider-criblio/tools/import-cli/version.Commit={{.Commit}} -X github.com/criblio/terraform-provider-criblio/tools/import-cli/version.Date={{.CommitDate}}'
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [zip]
    name_template: "{{ .ProjectName }}_{{ or .Env.GOATIFY_VERSION .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ or .Env.GOATIFY_VERSION .Version }}_SHA256SUMS"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  name_template: "cribl-tf-config-exporter {{ or .Env.GOATIFY_VERSION .Version }}"
