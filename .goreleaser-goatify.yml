# GoReleaser config for goatify CLI. Triggered by tags: goatify-v0.0.1, goatify-v0.0.2, etc.
version: 2

project_name: goatify

before:
  hooks:
    - go mod tidy

builds:
  - id: goatify
    dir: .
    main: ./tools/import-cli
    binary: goatify
    env:
      - CGO_ENABLED=0
      - GOMAXPROCS=1
      - GOMEMLIMIT=512MiB
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [zip]
    name_template: "{{ .ProjectName }}_{{ or .Env.GOATIFY_VERSION .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ or .Env.GOATIFY_VERSION .Version }}_SHA256SUMS"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  name_template: "goatify {{ or .Env.GOATIFY_VERSION .Version }}"
